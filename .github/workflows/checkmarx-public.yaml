name: Checkmarx One Scan (Public Repos)

# use only job-level permissions
permissions: {}

on:
  pull_request_target:  # Safe for public repos with fork PRs (doesn't checkout PR code)
    types: [opened, synchronize, reopened]
    branches: ["**"]
  push:
    branches: ["main"]
  workflow_dispatch: {}
  schedule:
    - cron: "0 0 * * *"   # run daily at midnight UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  build:
    # Only run if repo is public
    if: github.event.repository.private == false

    permissions:
      contents: read
      pull-requests: write
      security-events: write
      actions: read

    runs-on: ubuntu-latest

    steps:
      # CRITICAL: DO NOT CHECKOUT THE PR CODE
      # This is what makes it safe with pull_request_target for fork PRs
      # checkmarx-scan-public uses URL-based scanning (Checkmarx fetches code directly)

      - name: Checkmarx Full Scan
        uses: midnightntwrk/upload-sarif-github-action/checkmarx-scan-public@1cb8d9377f78e905e4c8a905b3cebc51deff3e47
        with:
          cx-client-id: ${{ secrets.CX_CLIENT_ID }}
          cx-client-secret: ${{ secrets.CX_CLIENT_SECRET_EU }}
          cx-tenant: ${{ secrets.CX_TENANT }}
          scs-repo-token: ${{ secrets.MIDNIGHTCI_REPO }}
          upload-to-github: "true"
